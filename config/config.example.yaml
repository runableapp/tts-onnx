service_name: tts
listen_addr: 127.0.0.1:18741
play_on_speak: false
# bearer_token: "set-a-local-secret-token"

read_timeout: 15s
write_timeout: 60s
idle_timeout: 120s

max_concurrent_requests: 2
synth_timeout: 25s
model_idle_unload: 10m
max_text_chars: 1200
max_payload_bytes: 1048576

state_dir: ~/.local/state/tts-onnx
cache_dir: ~/.cache/tts-onnx
data_dir: ~/.local/share/tts-onnx
log_dir: ~/.local/state/tts-onnx/logs
temp_dir: ~/.local/share/tts-onnx/tmp

model_manifest_path: ~/.local/share/tts-onnx/models/manifest.json

# "mock" is default for local development.
# use "sherpa-onnx" once native runtime packaging is ready.
engine: mock
